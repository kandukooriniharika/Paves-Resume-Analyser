spring.application.name=paves-resume-analyser

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/resumedb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# ── Seed Data ─────────────────────────────────────────────────────────────────
# FIX: use always + continue-on-error so re-runs don't fail on duplicate key
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:paves-technologies-super-secret-key-2024-minimum-32-characters-long}
jwt.expiration.ms=86400000

# ── File Upload ───────────────────────────────────────────────────────────────
# Increased for bulk resume uploads (ZIP + multiple files)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=500MB

# ── AI Screening Service (Python FastAPI) ─────────────────────────────────────
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

# ── Storage ───────────────────────────────────────────────────────────────────
# Options: local (saves to ./uploads/screening/) or s3 (AWS S3)
storage.type=${STORAGE_TYPE:local}

# AWS S3 — only used when storage.type=s3
aws.s3.bucket=${AWS_S3_BUCKET:paves-resumes-prod}
aws.s3.region=${AWS_S3_REGION:ap-south-1}
aws.s3.access-key=${AWS_ACCESS_KEY_ID:YOUR_ACCESS_KEY}
aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY:YOUR_SECRET_KEY}

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ── SpringDoc / Swagger UI ────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.paves=INFO
logging.level.org.springframework.security=WARN

# ── Cloudinary (resume file storage) ─────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your-cloud-name}
cloudinary.api-key=${CLOUDINARY_API_KEY:your-api-key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your-api-secret}

# ── LinkedIn ATS Webhook ──────────────────────────────────────────────────────
linkedin.webhook.secret=${LINKEDIN_WEBHOOK_SECRET:}
linkedin.client-id=${LINKEDIN_CLIENT_ID:}
linkedin.client-secret=${LINKEDIN_CLIENT_SECRET:}

# ── Naukri API (optional enterprise tier) ─────────────────────────────────────
naukri.api.url=${NAUKRI_API_URL:}
naukri.api.key=${NAUKRI_API_KEY:}

# ── SpringDoc ─────────────────────────────────────────────────────────────────
springdoc.api-docs.enabled=true

spring.application.name=paves-resume-analyser

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/resumedb
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ── Seed Data ─────────────────────────────────────────────────────────────────
# FIX: use always + continue-on-error so re-runs don't fail on duplicate key
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=paves-technologies-super-secret-key-2024-minimum-32-characters-long
jwt.expiration.ms=86400000

# ── Gemini AI ─────────────────────────────────────────────────────────────────

spring.application.name=paves-resume-analyser

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/resumedb
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ── Seed Data ─────────────────────────────────────────────────────────────────
# FIX: use always + continue-on-error so re-runs don't fail on duplicate key
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=paves-technologies-super-secret-key-2024-minimum-32-characters-long
jwt.expiration.ms=86400000

# ── File Upload ───────────────────────────────────────────────────────────────
# Increased for bulk resume uploads (ZIP + multiple files)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=500MB

# ── AI Screening Service (Python FastAPI) ─────────────────────────────────────
ai.service.url=http://localhost:8000

# ── Storage ───────────────────────────────────────────────────────────────────
# Options: local (saves to ./uploads/screening/) or s3 (AWS S3)
storage.type=local

# AWS S3 — only used when storage.type=s3
aws.s3.bucket=paves-resumes-prod
aws.s3.region=ap-south-1
aws.s3.access-key=YOUR_ACCESS_KEY
aws.s3.secret-key=YOUR_SECRET_KEY

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ── SpringDoc / Swagger UI ────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.paves=INFO
logging.level.org.springframework.security=WARN


springdoc.api-docs.enabled=true